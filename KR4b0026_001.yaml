body:
  text: 卷一從武帝華林園宴二章從武帝華林園宴習習春陽帝出乎震天施地生以應仲春思文聖皇順時秉仁欽若靈則飲御嘉賓洪恩普暢慶乃眾臣其慶惟何錫以帝祉肆覲群后有客戾止外納要荒內延卿士簫管詠德八音咸理凱樂飲酒莫不宴喜類聚三十九廣文選九作晉武帝華林園詩初學記十四詩紀二十一三月三日從華林園清節中季春姑洗通滯塞玉輅扶淥池臨川蕩苛慝初學記四詩紀四十
