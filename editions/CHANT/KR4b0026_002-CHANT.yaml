body:
  text: 卷二蒲萄賦靈運宣流休祥允淑懿彼秋方乾元是畜有蒲萄之珍偉應淳和而延育藝文類聚八十七讓樂事表臣掌著作又知祕書今覆校錯誤十萬餘卷書不可倉卒復兼他職必有廢頓者也薦李胤為司徒表薦李胤為司徒表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李胤忠亮高潔堪處台輔御覽二百八引荀勖對詔薦三公保傅表三公保傅宜得其人若使楊珧參輔東宮必當仰稱聖意尚書令衛瓘吏部尚書山濤皆可為司徒如以瓘新為令未出者濤即其人晉書荀勖傳時太尉賈充司徒李胤竝薨太子太傅又闕勖表陳從之讓尚書令表讓尚書令表昔六官所掌冢宰為首秦漢公卿贊以丞相御史為冠今者尚書令總此三者非臣駑闇所宜忝竊書鈔五十九引荀勖集讓豫州大中正表被敕以臣為豫州大中正臣與州閭鄉黨初不相接臣本州十郡方于他州人數倍多品藻人物以正一州清論此乃臧否之本風俗所重御覽二百六十五引荀勖集奏校試笛律中所出御府銅管二十五具太常樂部郎劉秀等校試其三具與杜夔左延年律法同其二十二具視其名題尺寸是笛律也問協律中郎將列和云昔魏明帝時令和承受笛聲以作此律欲使學者別居一坊歌詠講習依此律調至于都合樂時但識其尺寸之名則絲竹歌詠皆得均合歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也藝文類聚五御覽十六竝引晉諸公贊又見晉書律厤志上又見宋書律志奏條牒諸律問列和意狀奏條牒諸律問列和意狀昔先王之作樂也以振風蕩俗饗神祜賢必協律呂之和以節八音之中是故郊祀朝宴用之有制歌奏分敘清濁有宜故曰五聲十二律還相為宮此經傳記籍可得而知者也如和對辭笛之長短無所象則率意而作不由曲度攷以正律皆不相應吹其聲均多不諧合又辭先師傳笛別其清濁直以長短工人裁制舊不依律是為作笛無法而和寫笛造律又令琴瑟歌詠從之為正非所以稽古先哲垂憲于後者也謹條牒諸律問和意狀如左及依典制用十二律造笛象十二枚聲均調和器用便利講肄彈擊必合律呂況乎宴饗萬國奏之廟堂者哉雖伶夔曠遠至音難精猶宜儀形古者以求厥衷合乎經禮于制為詳若可施用請更部笛工選竹造作下太樂樂府施行平議諸杜夔左延年律可皆留其御府笛正聲下徵各一具皆銘題作者姓名其餘無所施用還付御府毀勖又問和作笛為可依十二律作十二笛令一孔依一律然後乃以為樂不和辭太樂東箱長笛正聲已長四尺二寸今當復取其下徵之聲于法聲濁者笛當長計其尺寸乃五尺有餘和昔日作之不可吹也又笛諸孔雖不校試意謂不能得一孔輒應一律也案太樂四尺二寸笛正聲均應蕤賓以十二律還相為宮推法下徵之孔當應律大呂大呂笛長二尺六寸有奇不得長五尺餘輒令太樂郎劉秀鄧昊等依律作大呂笛以示和又吹七律一孔一校聲皆相應然後令郝生鼓箏宋同吹笛以為雜引相和諸曲和乃辭曰自和父祖漢世以來笛家相傳不知此法而令調均與律相應實非所及也郝生魯基种整朱夏皆與和同又問和笛有六孔及其體中之空為七和為能盡名其宮商角徵不孔調與不調以何檢知和辭先師相傳吹笛但以作曲相語為某曲當舉某指初不知七孔盡應何聲也若當作笛其仰尚方笛工依案舊像訖但吹取鳴者初不復校其諸孔調與不調也案周禮調樂金石有一定之聲是故造鐘磬者先依律調之然後施于廂懸作樂之時諸音皆受鐘磬之均即為悉應律也至于饗宴殿堂之上無廂懸鐘磬以笛有一定之調故諸絃歌皆從笛為正是為笛猶鐘磬宜必合于律呂如和所對直以意造率短一寸七孔聲均不知其皆應何律調與不調無以檢正唯取竹之鳴者為無法制輒令部郎劉秀鄧昊王豔魏邵等與笛工參共作笛工人造其形律者定其聲然後器象有制音均和協又問和若不知律呂之義作樂音均高下清濁之調當以何名之和辭每合樂時隨歌者聲之清濁用笛有長短假令聲濁者用三尺二笛因名曰此三尺二調也聲清者用二尺九笛因名曰此二尺九調也漢魏相傳施行皆然案周禮奏六樂乃奏黃鍾歌大呂乃奏太簇歌應鍾皆以律呂之義紀歌奏清濁而和所稱以二尺三尺為名雖漢魏用之俗而不典部郎劉秀鄧昊等以律作笛三尺二寸者應無射之律若宜用長笛執樂者曰請奏無射周語曰無射所以宣布哲人之令德示民軌儀也二尺八寸四分四釐應黃鍾之律若宜用短笛執樂者曰請奏黃鍾周語曰黃鍾所以宣養六氣九德也是則歌奏之義當合經禮考之古典于制為雅晉書律厤志上宋書律志奏諫用伊羨趙咸為中書舍人奏諫用伊羨趙咸為中書舍人晉武帝時門下啟通事令史伊羨趙咸為中書舍人對掌文法勖奏以為不可御覽二百二十二引荀勖集今天下幸賴陛下聖德六合為一望道化隆洽垂之將來而門下上稱程咸張惲下稱此等欲以文法為政皆愚臣所未達者昔張釋之諫漢文謂獸圈嗇夫不宜見用邴吉住車明調和陰陽之本此二人豈不知小吏之惠誠重惜大化也昔魏武帝使中軍司荀攸典刑獄明帝時猶以付內常侍以臣所聞明帝時唯有通事劉泰等官不過與殿中同號耳又頃言論者皆云省官減事而求益吏者相尋矣多云尚書郎大令史不親文書乃委付書令史及幹誠吏多則相倚也增置文法之職適恐更耗擾臺閣臣竊謂不可晉書荀勖傳甲乙問議甲乙問議昔鄉里鄭子群娶陳司空從妹後隔呂布之亂不復相知存亡更娶鄉里蔡氏女徐州平定陳氏得還遂二妃竝存蔡氏之子字元釁為陳氏服嫡母之服事陳公以從舅之禮族兄宗伯曾責元釁謂抑其親鄉里先達以元釁為合宜不審此事粗相似否晉書禮志中安豐太守程諒先已有妻後又娶遂立二嫡前妻亡後妻子勳疑所服中書令張華造甲乙問王昌前母服議昔鄭子群娶陳司空從妹後隔呂布之亂不知存亡更娶蔡氏女徐州平後陳氏得還遂二妃竝存蔡氏之子元疊為陳氏服嫡母之服族兄宗伯曾責元疊謂抑其親鄉里先達以元疊為合宜通典八十九又陳遣王公之國議又陳遣王公之國議如詔準古方伯選才使軍國各隨方面為都督誠如明旨至于割正封疆使親疏不同誠為佳矣然分裂舊土猶懼多所搖動必使人心忽擾思惟竊宜如前若于事不得不時有所轉封而不至分割土域有所損奪者可隨宜節度其五等體國經遠實不成制度然但虛名其于實事略與舊郡縣鄉亭無異若造次改奪恐不能不以為恨今方了其大者以為五等可須後裁度凡事雖有久而益善者若臨時或有不解亦不可忽晉書荀勖傳省吏議省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清靜致畫一之歌此清心之本也漢文垂拱幾致刑措此省事也光武并合吏員縣官國邑裁置十一此省官也魏太和中遣王人四出減天下吏員正始中亦并合郡縣此省吏也今必欲求之于本則宜以省事為先凡居位者使務思蕭曹之心以翼佐大化篤義行崇敦睦使昧寵忘本者不得容而偽行自息浮華者懼矣重敬讓尚止足令賤不妨貴少不陵長遠不閒親新不閒舊小不加大淫不破義則上下相安遠近相信矣位不可以進趣得譽不可以朋黨求則是非不妄而明官人不惑于聽矣去奇技抑異說好變舊以徼非常之利者必加其誅則官業有常人心不遷矣事留則政稽政稽則功廢處位者而孜孜不怠奉職司者而夙夜不懈則雖在挈瓶而守不假器矣使信若金石小失不害大政忍忿捐以容之簡文案略細苛令之所施必使人易視聽願之如陽春畏之如雷震勿使微文煩撓為百吏所黷二三之命為百姓所饜則吏竭其誠下悅上命矣設官分職委事責成君子心競而不力爭量能受任思不出位則官無異業政典不奸矣凡此皆愚所謂省事之本也苟無此愆雖不省吏天下必謂之省矣若欲省官私謂九寺可并于尚書蘭臺宜省付三府然施行歷代世之所習是以久抱愚懷而不敢言至于省事實以為善若直作大例皆減其半恐文武眾官郡國職業及事之興廢不得皆同凡發號施令典而當則安儻有駁者或致壅否凡職所臨履先精其得失使忠信之官明察之長各裁其中先條上言之然後混齊大體詳宜所省則令下必行不可搖動如其不爾恐適惑人聽比前行所省皆須臾輒復或激而滋繁亦不可不重晉書荀勖傳時又議省州郡縣半吏以赴農功勖議以為云云為晉文王與孫晧書聖人稱有君臣然後有上下禮義是故大必字小小必事大然後上下安服群生獲所逮至末塗純德既毀勦民之命以爭彊于天下違禮順之至理則仁者弗由也方今主上聖明覆幬無外僕備位宰輔屬當國重惟華夏乖殊方隅圮裂六十餘載金革亟動無年不戰暴骸喪元困悴罔定每用悼心坐以待旦將欲止戈興仁為百姓請命故分命偏師平定蜀漢役未經年全軍獨克于時猛將謀夫朝臣庶士咸以奉天時之宜就征討之軍藉吞敵之勢宜遂回旗東指以臨吳境舟師泛江順流而下陸軍南轅取徑四郡兼成都之械漕巴漢之粟然後以中軍整旅二方雲會未及浹辰可使江表底平南夏順軌然國朝深惟伐蜀之舉雖有靜難之功亦悼蜀民獨罹其害戰于綿竹者自元帥以下竝受斬戮伏屍蔽地血流丹野一之于前猶追恨不忍況重之于後乎是故旋師案甲思與南邦共全百姓之命夫料力忖勢度資量險遠攷古昔廢興之理近鑒西蜀安危之效隆德保祚去危即順屈己以寍四海者仁哲之高致也履危偷安隕德覆祚而不稱于後世者非智者之所居也今朝廷遣徐紹孫彧獻書喻懷若書御于前必少留意回慮革算結歡弭兵共為一家惠矜吳會施及中土豈不泰哉此昭心之大願也敢不承受若不獲命則普天率土期于大同雖重干戈固不獲已也吳志歸命侯傳注引漢晉春秋今餉雜色綾十端縠三端細縑十匹藝文類聚八十五御覽八百十六引兩條又八百十八荅王琛書王陶丘州人廟盜鮮卑金頭寶帶十二枚書鈔一百二十九上穆天子傳序上穆天子傳序序古文穆天子傳者太康二年汲縣民不準盜發古冢所得書也皆竹簡素絲編以臣勖前所攷定古尺度其簡長二尺四寸以墨書一簡四十字汲者戰國時魏地也案所得紀年蓋魏惠成王子今王之冢也于世本蓋襄王也案史記六國年表自今王二十一年至秦始皇三十四年燔書之歲八十六年及至太康二年初得此書凡五百七十九年其書言周穆王遊行之事春秋左氏傳曰穆王欲肆其心周行于天下將皆使有車轍馬跡焉此書所載則其事也王好巡守得盜驪騄耳之乘造父為御以觀四荒北絕流沙西登昆侖見西王母與太史公記同汲郡收書不謹多毀落殘缺雖其言不典皆是古書頗可觀覽謹以二尺黃紙寫上請事平以本簡書及所新寫竝付祕書繕寫藏之中經副在三閣謹序穆天子傳道藏本
