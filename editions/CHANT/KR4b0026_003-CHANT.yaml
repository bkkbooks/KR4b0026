body:
  text: 晉四箱樂歌十七篇晉四箱樂歌十七篇於皇當於赫正旦大會行禮歌四篇於皇元首群生資始履端大享敬御繁祉肆覲群后爰及卿士欽順則元允也天子明明當巍巍明明天子臨下有赫四表宅心惠浹荒貊柔遠能邇孔淑不逆來格祁祁邦家是若邦國當洋洋光光邦國天篤其祜丕顯哲命顧柔三祖世德作求奄有九土思我皇度彝倫攸序祖宗當鹿鳴惟祖惟宗高朗緝熙對越在天駿惠在茲聿求厥成我皇崇之式固其猶往敬用治正旦大會王公上壽酒歌一篇踐元辰當羽觴行正旦大會王公上壽酒歌一篇踐元辰延顯融獻羽觴祈令終我皇壽而隆我皇茂而嵩本枝奮百世休祚鍾聖躬煌煌當鹿鳴食舉樂東西箱歌十二篇煌煌七燿重明交暢我有嘉賓是應是貺邦政既圖接以大饗人之好我式遵德讓賓之初筵當於穆賓之初筵藹藹濟濟既朝乃宴以洽百禮頒以位敘或廷或陛登儐台叟亦有兄弟胥子陪僚憲茲度楷觀頤養正降福孔偕三后當昭昭昔我三后大業是維今我聖皇焜燿前暉奕世重規明照九畿思輯用光時罔有違陟禹之跡莫不來威天被顯祿福履是綏赫矣當華華赫矣太祖克廣明德廓開宇宙正世立則變化不經民無瑕慝創業垂統兆我晉國烈文當朝宴烈文伯考時惟帝景夷險平亂威而不猛御衡不迷皇塗煥炳七德咸宣其寧惟永猗歟當盛德猗歟盛歟先皇聖文則天作孚大哉為君慎徽五典帝載是懃文武發揮茂建嘉勳修己濟治民用寧殷懷遠燭幽玄教氛氳善世不伐服事參分德博化隆道冒無垠隆化當綏萬邦隆化洋洋帝命溥將登我晉道越惟聖皇龍飛革運臨燾八荒叡哲欽明配蹤虞唐封建厥福駿發其祥三朝習吉終然允臧其臧惟何總彼萬方元侯列辟四嶽蕃王時見世享率茲有常旅揖在庭嘉客在堂宋衛既臻陳留山陽我有賓使觀國之光貢賢納計獻璧奉璋保祐命之申錫無疆振鷺當朝朝振鷺于飛鴻漸其翼京邑穆穆四方是式無競惟人王綱允敕君子來朝言觀其極翼翼當順天翼翼大君民之攸暨信理天工惠康不匱將遠不仁訓以淳粹幽明有倫俊乂在位九族既睦庶邦順比開元布憲四海鱗萃協時正統殊塗同致厚德載物靈心隆貴敷奏讜言納以無諱樹之典象誨之義類上教如風下應如卉一人有慶群萌以遂我后宴喜令聞不墜既宴當陟天庭既宴既喜翕是萬邦禮儀卒度物有其容晢晢庭燎喤喤鼓鍾笙磬詠德萬舞象功八音克諧俗易化從其和如樂庶品時邕時邕當參兩儀時邕份份六合同塵往我祖宣威靜殊鄰首定荊楚遂平燕秦娓娓文皇邁德流仁爰造草昧應乾順民靈瑞告符休徵饗震天地弗違以和神人既戡庸蜀吳會是賓肅慎率職楛矢來陳韓濊進樂均協清鈞西旅獻獒扶南效珍蠻裔重譯玄齒文身我皇撫之景命惟新嘉會愔愔嘉會有聞無聲清酤既奠籩豆既馨禮充樂備簫韶九成愷樂飲酒酣而不盈率土歡豫邦國以寧王猷允塞萬載無傾晉正德大豫二舞歌二篇正德舞歌人文垂則盛德有容聲以依詠舞以象功干戚發揮節以笙鏞羽籥雲會翊宣令蹤敷美盡善允協時邕煥炳其章光乎萬邦萬邦洋洋承我晉道配天作享元命有造上化如風民應如草穆穆斌斌形于綴兆文武旁作慶流四表無競維烈永世是紹大豫舞歌豫順以動大哉惟時時邁其仁世載邕熙兆我區夏宣文是基大業惟新我皇隆之重光累曜欽明文思迄用有成惟晉之祺穆穆聖皇受命既固品物咸寧芳烈雲布文教旁通篤以淳素玄化洽暢被之暇豫作樂崇德同美韶濩濬邈幽遐式遵王度
